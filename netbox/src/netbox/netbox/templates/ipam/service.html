{% extends 'generic/object.html' %}
{% load i18n %}

{% block breadcrumbs %}
  {{ block.super }}
  {% if object.parent and breadcrumb_queryparam %}
    <li class="breadcrumb-item">
      <a href="{% url 'ipam:service_list' %}?{{ breadcrumb_queryparam }}={{ object.parent.pk }}">
        {{ object.parent }}
      </a>
    </li>
  {% endif %}
{% endblock breadcrumbs %}
